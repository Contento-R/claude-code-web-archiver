name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync GitHub releases with version history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create missing release for every "vX.Y.Z" commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Walk history oldest-first. For each commit whose subject
          # starts with vX.Y.Z, create the corresponding GitHub release
          # at that SHA unless it already exists. Notes come from the
          # matching `## [X.Y.Z]` block in CHANGELOG.md.
          created=0
          skipped=0
          git log --reverse --format='%H %s' | while read -r sha subject; do
            tag=$(printf '%s' "$subject" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -z "$tag" ]; then continue; fi
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "skip $tag (already exists)"
              continue
            fi
            ver="${tag#v}"
            awk -v ver="$ver" '
              $0 ~ "^## \\[" ver "\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > /tmp/notes.md
            if [ ! -s /tmp/notes.md ]; then
              printf "Release %s\n" "$tag" > /tmp/notes.md
            fi
            echo "create $tag at $sha"
            gh release create "$tag" \
              --title "$tag" \
              --notes-file /tmp/notes.md \
              --target "$sha"
            sleep 1
          done

      - name: Release current @version if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver=$(grep -E '^// @version' claude-code-web-archiver.user.js | head -1 | awk '{print $3}')
          tag="v$ver"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag already exists, nothing to do."
            exit 0
          fi
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            printf "Release %s\n" "$tag" > /tmp/notes.md
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes-file /tmp/notes.md \
            --target "${GITHUB_SHA}"
